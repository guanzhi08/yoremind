services:
  - type: web
    name: yoremind-api
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yoremind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

databases:
  - name: yoremind-db
    databaseName: yoremind
    user: yoremind
    region: singapore
