databases:
  - name: yoremind-db
    databaseName: yoremind_db
    user: yoremind
    region: singapore
    plan: free

services:
  - type: web
    name: yoremind-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yoremind-db
          property: connectionString
      - key: SECRET_KEY
        value: yoremind-super-secret-key-2024-production
      - key: FIREBASE_CREDENTIALS_JSON
        value: "{}"
      - key: PYTHON_VERSION
        value: "3.11.0"
